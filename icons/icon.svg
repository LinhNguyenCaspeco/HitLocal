<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Background gradient: deep navy to dark indigo -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>

    <!-- Lightning bolt gradient: cyan → violet → orange -->
    <linearGradient id="bolt" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%"   stop-color="#06b6d4"/>
      <stop offset="50%"  stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>

    <!-- Glow blur for the bolt -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle radial glow behind bolt -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a855f7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Halo glow circle -->
  <ellipse cx="64" cy="68" rx="46" ry="46" fill="url(#halo)"/>

  <!-- Accent dot — top right corner sparkle -->
  <circle cx="100" cy="20" r="4" fill="#06b6d4" opacity="0.7"/>
  <circle cx="112" cy="32" r="2.5" fill="#a855f7" opacity="0.5"/>
  <circle cx="108" cy="14" r="2" fill="#f97316" opacity="0.5"/>

  <!-- Lightning bolt — glow layer (thickened, blurred) -->
  <polygon
    points="71,12  39,68  61,68  49,116  89,60  67,60"
    fill="url(#bolt)"
    opacity="0.5"
    filter="url(#glow)"
  />

  <!-- Lightning bolt — crisp top layer -->
  <polygon
    points="71,12  39,68  61,68  49,116  89,60  67,60"
    fill="url(#bolt)"
  />
</svg>
