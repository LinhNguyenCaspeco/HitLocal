<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>HitLocal</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 12px;
        background: #1a1a1a;
        color: #d4d4d4;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Toolbar ── */
      .toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        background: #1e1e1e;
        border-bottom: 1px solid #2e2e2e;
        flex-shrink: 0;
      }

      .toolbar-title {
        font-weight: 700;
        font-size: 13px;
        color: #e0e0e0;
        letter-spacing: 0.3px;
        flex: 1;
      }

      .badge-count {
        background: #0e639c;
        color: #fff;
        border-radius: 10px;
        padding: 2px 8px;
        font-size: 11px;
        font-weight: 600;
      }

      .btn-clear {
        padding: 4px 12px;
        background: transparent;
        border: 1px solid #444;
        border-radius: 4px;
        color: #bbb;
        cursor: pointer;
        font-size: 11px;
        font-family: inherit;
      }

      .btn-clear:hover {
        background: #2a2a2a;
        border-color: #666;
        color: #e0e0e0;
      }

      /* ── Filter bar ── */
      .filter-bar {
        padding: 6px 12px;
        background: #1e1e1e;
        border-bottom: 1px solid #2e2e2e;
        flex-shrink: 0;
      }

      .filter-bar input {
        width: 100%;
        padding: 5px 10px;
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        border-radius: 4px;
        color: #d4d4d4;
        font-size: 12px;
        font-family: inherit;
        outline: none;
        transition: border-color 0.15s;
      }

      .filter-bar input:focus {
        border-color: #0e639c;
      }

      .filter-bar input::placeholder {
        color: #666;
      }

      /* ── Request list ── */
      #request-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      #request-list::-webkit-scrollbar {
        width: 6px;
      }

      #request-list::-webkit-scrollbar-track {
        background: transparent;
      }

      #request-list::-webkit-scrollbar-thumb {
        background: #3a3a3a;
        border-radius: 3px;
      }

      .empty-state {
        text-align: center;
        color: #555;
        margin-top: 60px;
        line-height: 2;
        font-size: 12px;
      }

      .empty-state strong {
        color: #888;
        font-family: monospace;
      }

      /* ── Request card ── */
      .request-card {
        background: #222222;
        border: 1px solid #2e2e2e;
        border-radius: 4px;
      }

      .request-card.hidden {
        display: none;
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        cursor: pointer;
        user-select: none;
        min-width: 0;
      }

      .card-header:hover {
        background: #272727;
      }

      .chevron {
        font-size: 8px;
        color: #555;
        transition: transform 0.15s;
        flex-shrink: 0;
      }

      .card-header.expanded .chevron {
        transform: rotate(90deg);
      }

      .method-badge {
        font-size: 10px;
        font-weight: 700;
        padding: 2px 6px;
        border-radius: 3px;
        width: 46px;
        text-align: center;
        letter-spacing: 0.3px;
        flex-shrink: 0;
      }

      .method-GET    { background: #0f3a0f; color: #4ec94e; border: 1px solid #1a5c1a; }
      .method-POST   { background: #3a2a0f; color: #e8a84e; border: 1px solid #5c4318; }
      .method-PUT    { background: #0f2a3a; color: #4eaee8; border: 1px solid #184c6e; }
      .method-DELETE { background: #3a0f0f; color: #e84e4e; border: 1px solid #6e1818; }
      .method-PATCH  { background: #2a0f3a; color: #ae4ee8; border: 1px solid #4e1878; }
      .method-OTHER  { background: #2a2a2a; color: #999;    border: 1px solid #444; }

      /* min-width: 0 is required for text-overflow to work inside a flex child */
      .card-url {
        flex: 1;
        min-width: 0;
        font-size: 11px;
        font-family: "Consolas", "Fira Mono", monospace;
        color: #7fb8d8;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .card-actions {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
      }

      .status-badge {
        font-size: 10px;
        font-weight: 700;
        padding: 2px 7px;
        border-radius: 3px;
        min-width: 36px;
        text-align: center;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .status-idle    { visibility: hidden; }
      .status-loading { background: #2a2a2a; color: #888; border: 1px solid #444; }
      .status-success { background: #0f3a0f; color: #4ec94e; border: 1px solid #1a5c1a; }
      .status-error   { background: #3a0f0f; color: #e84e4e; border: 1px solid #6e1818; }

      /* ── Buttons ── */
      .btn-hit, .btn-curl {
        padding: 3px 10px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
        font-family: inherit;
        white-space: nowrap;
      }

      .btn-hit {
        background: #0e639c;
        color: #fff;
        border: 1px solid #1177bb;
      }

      .btn-hit:hover   { background: #1177bb; }
      .btn-hit:disabled { background: #2a2a2a; color: #666; border-color: #3a3a3a; cursor: not-allowed; }

      .btn-curl {
        background: transparent;
        color: #aaa;
        border: 1px solid #444;
      }

      .btn-curl:hover { background: #2a2a2a; color: #e0e0e0; border-color: #666; }

      /* ── Expandable detail ── */
      .card-detail {
        display: none;
        padding: 10px 12px 12px;
        border-top: 1px solid #2e2e2e;
        background: #1a1a1a;
      }

      .card-detail.open { display: block; }

      .detail-section {
        margin-bottom: 10px;
      }

      .detail-section:last-child {
        margin-bottom: 0;
      }

      .detail-label {
        font-size: 10px;
        font-weight: 700;
        color: #666;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        margin-bottom: 4px;
      }

      .detail-url {
        font-size: 11px;
        font-family: "Consolas", "Fira Mono", monospace;
        color: #7fb8d8;
        word-break: break-all;
        line-height: 1.5;
        background: #222;
        border: 1px solid #2e2e2e;
        border-radius: 4px;
        padding: 6px 8px;
      }

      .response-box {
        background: #1a1a1a;
        border: 1px solid #2e2e2e;
        border-radius: 4px;
        padding: 8px 10px;
        font-size: 11px;
        font-family: "Consolas", "Fira Mono", monospace;
        white-space: pre-wrap;
        word-break: break-all;
        color: #ce9178;
        line-height: 1.5;
      }

      .response-box::-webkit-scrollbar       { width: 5px; }
      .response-box::-webkit-scrollbar-track { background: transparent; }
      .response-box::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 3px; }

      .response-box.status-success { border-color: #1a4a1a; }
      .response-box.status-error   { border-color: #4a1a1a; }

      /* ── Progress bar ── */
      .progress-bar {
        height: 2px;
        width: 100%;
        overflow: hidden;
        display: none;
      }

      .progress-bar.active {
        display: block;
      }

      .progress-bar::after {
        content: "";
        display: block;
        height: 100%;
        width: 40%;
        background: linear-gradient(90deg, transparent, #06b6d4, #a855f7, #f97316, transparent);
        animation: sweep 1.2s ease-in-out infinite;
      }

      @keyframes sweep {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }

      /* ── JSON tree ── */
      .json-tree {
        font-size: 11px;
        font-family: "Consolas", "Fira Mono", monospace;
        line-height: 1.6;
      }

      .jn-line { display: block; }

      .jn-children {
        padding-left: 16px;
        border-left: 1px solid #333;
        margin-left: 4px;
      }

      .jn-toggle {
        cursor: pointer;
        color: #666;
        user-select: none;
        margin-right: 2px;
        font-size: 10px;
      }

      .jn-toggle:hover { color: #aaa; }

      .jn-bracket { color: #aaa; display: inline; }
      .jn-key     { color: #9cdcfe; }
      .jn-string  { color: #ce9178; }
      .jn-number  { color: #b5cea8; }
      .jn-bool    { color: #569cd6; }
      .jn-null    { color: #569cd6; }
      .jn-comma   { color: #aaa; }
      .jn-preview { color: #666; font-style: italic; }

      /* ── Settings button ── */
      .btn-settings {
        padding: 4px 8px;
        background: transparent;
        border: 1px solid #444;
        border-radius: 4px;
        color: #888;
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
        font-family: inherit;
        transition: color 0.15s, border-color 0.15s, background 0.15s;
      }

      .btn-settings:hover,
      .btn-settings.active {
        background: #2a2a2a;
        border-color: #0e639c;
        color: #4eaee8;
      }

      /* ── Settings panel ── */
      .settings-panel {
        display: none;
        flex-direction: column;
        gap: 0;
        background: #1e1e1e;
        border-bottom: 2px solid #0e639c;
        flex-shrink: 0;
      }

      .settings-panel.open {
        display: flex;
      }

      .settings-header {
        padding: 10px 14px 6px;
        font-size: 11px;
        font-weight: 700;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.6px;
      }

      .settings-body {
        padding: 0 14px 12px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px 16px;
      }

      .settings-field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .settings-field label {
        font-size: 10px;
        font-weight: 600;
        color: #777;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .settings-field input {
        padding: 5px 8px;
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        border-radius: 4px;
        color: #d4d4d4;
        font-size: 11px;
        font-family: "Consolas", "Fira Mono", monospace;
        outline: none;
        transition: border-color 0.15s;
      }

      .settings-field input:focus {
        border-color: #0e639c;
      }

      .settings-field input::placeholder {
        color: #555;
      }

      .settings-divider {
        grid-column: 1 / -1;
        height: 1px;
        background: #2a2a2a;
        margin: 2px 0;
      }

      .settings-field.span-2 {
        grid-column: 1 / -1;
      }

      .settings-hint {
        grid-column: 1 / -1;
        font-size: 10px;
        color: #555;
        font-style: italic;
      }

      .settings-footer {
        padding: 0 14px 12px;
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }

      .btn-save {
        padding: 5px 16px;
        background: #0e639c;
        color: #fff;
        border: 1px solid #1177bb;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
      }

      .btn-save:hover { background: #1177bb; }

      .btn-cancel {
        padding: 5px 12px;
        background: transparent;
        color: #888;
        border: 1px solid #444;
        border-radius: 4px;
        font-size: 11px;
        cursor: pointer;
        font-family: inherit;
      }

      .btn-cancel:hover { background: #2a2a2a; color: #ccc; }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <span class="toolbar-title">HitLocal</span>
      <span class="badge-count" id="count">0</span>
      <button class="btn-clear" id="btn-clear">Clear</button>
      <button class="btn-settings" id="btn-settings" title="Configure URL mapping">⚙</button>
    </div>

    <div class="settings-panel" id="settings-panel">
      <div class="settings-header">URL Mapping</div>
      <div class="settings-body">
        <div class="settings-field">
          <label>Source Origin (capture)</label>
          <input id="in-source-origin" type="text" placeholder="https://rms.dev.caspeco.net" />
        </div>
        <div class="settings-field">
          <label>Local Origin (send to)</label>
          <input id="in-local-origin" type="text" placeholder="https://localhost.caspeco.net:9552" />
        </div>
        <div class="settings-divider"></div>
        <div class="settings-field">
          <label>Source Path (optional)</label>
          <input id="in-source-path" type="text" placeholder="/api/navigation/marc/" />
        </div>
        <div class="settings-field">
          <label>Local Path (optional)</label>
          <input id="in-local-path" type="text" placeholder="/api/navigation/marc-local/" />
        </div>
        <p class="settings-hint">Path replacement is applied after origin replacement. Leave both blank to skip.</p>
      </div>
      <div class="settings-footer">
        <button class="btn-cancel" id="btn-cancel-settings">Cancel</button>
        <button class="btn-save" id="btn-save-settings">Save</button>
      </div>
    </div>

    <div class="filter-bar">
      <input type="text" id="filter-input" placeholder="Filter by URL…" />
    </div>
    <div id="request-list">
      <div class="empty-state" id="empty-state">
        Listening for requests on<br/>
        <strong id="empty-hint-host">rms.dev.caspeco.net</strong>
      </div>
    </div>
    <script src="panel.js"></script>
  </body>
</html>
